<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bali 2026 ✨</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: white;
      background: #0a0a0a;
      text-align: center;
    }

    .hero {
      height: 100vh;
      background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
    }

    .countdown {
      margin-top: 20px;
      font-size: 2rem;
    }
  </style>
</head>

<body>

  <div class="hero">
    <div>
      <h1>Bali 2026 🌴</h1>
      <div class="countdown" id="countdown"></div>
    </div>
  </div>

  <script>
    const tripDate = new Date("2026-05-07T14:00:00+02:00").getTime();
    const countdown = document.getElementById("countdown");

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = tripDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

      countdown.innerHTML = days + " days " + hours + " hours";
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>

</body>
</html>
